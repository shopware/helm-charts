name: Check pull request

on:
  pull_request:

permissions:
  # Optional: allow read access to pull request. Use with `only-new-issues` option.
  pull-requests: read
  # Optional: allow write access to checks to allow the action to annotate code in the PR.
  checks: write

jobs:
  CheckVersionUpdate:
    runs-on: runs-on=${{ github.run_id }}/runner=sw-amd64/cpu=1
    container: "ghcr.io/shopware-redstone/k8s-tooling-image:latest"
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
      - run: |
          git config --global --add safe.directory '*'
          git branch --track main origin/main
      - uses: dorny/paths-filter@d1c1ffe0248fe513906c8e24db8ea791d46f8590 # v3.0.3
        id: filter
        with:
          filters: |
            chart:
              - 'charts/shopware/**/*.yaml'
              - 'charts/shopware/**/*.yml'
              - 'charts/shopware/**/*.tpl'
              - 'charts/shopware/Chart.lock'
      - name: Check if version is updated with each pr
        if: steps.filter.outputs.chart == 'true'
        run: |
          oldAppVersion=$(git show main:charts/shopware/Chart.yaml | yq ".appVersion")
          oldVersion=$(git show main:charts/shopware/Chart.yaml | yq ".version")
          currentAppVersion=$(cat charts/shopware/Chart.yaml | yq ".appVersion")
          currentVersion=$(cat charts/shopware/Chart.yaml | yq ".version")
          if [ "$oldAppVersion" == "$currentAppVersion" ]; then
            echo "::error::Failing, reason: AppVersion is not updated. Current $currentAppVersion, old $oldAppVersion"
            exit 10
          fi
          if [ "$oldVersion" == "$currentVersion" ]; then
            echo "::error::Failing, reason: Version is not updated. Current $currentVersion, old $oldVersion"
            exit 11
          fi

  helm-lint:
    name: helm lint
    runs-on: runs-on=${{ github.run_id }}/runner=sw-amd64/cpu=1
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: stable
      - name: Set up Helm
        uses: azure/setup-helm@fe7b79cd5ee1e45176fcad797de68ecaf3ca4814 # v4.2.0
        with:
          version: v3.16.4
      - name: helm lint
        run: |
          helm lint charts/shopware
      - name: Check for null values in rendered templates
        run: |
          helm repo add percona https://percona.github.io/percona-helm-charts
          helm repo add grafana https://grafana.github.io/helm-charts
          helm repo add prometheus https://prometheus-community.github.io/helm-charts
          helm repo add opentelemetry https://open-telemetry.github.io/opentelemetry-helm-charts
          helm repo add rustfs https://rustfs.github.io/helm
          helm dependency build charts/shopware
          helm template test charts/shopware > rendered.yaml
          awk '
            BEGIN { RS="---\n"; ORS="---\n" }
            /^# Source: shopware\/templates\// { print }
          ' rendered.yaml > rendered-shopware.yaml
          if grep -n ': null$' rendered-shopware.yaml; then
            echo "::error::Rendered templates contain 'null' values. Wrap optional fields in {{- with }} blocks to omit them when unset."
            exit 1
          fi

  test-on-cluster:
    name: Cluster E2E Test
    runs-on: runs-on=${{ github.run_id }}/runner=sw-amd64/cpu=4
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Helm
        uses: azure/setup-helm@fe7b79cd5ee1e45176fcad797de68ecaf3ca4814 # v4.2.0
        with:
          version: v3.16.4

      - name: Create k8s Kind Cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0

      - name: Run preperation
        run: |
          kubectl apply --server-side -f https://github.com/kubernetes-sigs/gateway-api/releases/download/v1.4.1/standard-install.yaml
          kubectl apply -f https://raw.githubusercontent.com/kubernetes/ingress-nginx/main/deploy/static/provider/baremetal/deploy.yaml
          kubectl create namespace test
          kubectl create namespace test-template
          kubectl rollout status --namespace ingress-nginx deployment/ingress-nginx-controller --timeout=60s

          helm repo add percona https://percona.github.io/percona-helm-charts
          helm repo add grafana https://grafana.github.io/helm-charts
          helm repo add prometheus https://prometheus-community.github.io/helm-charts
          helm repo add shopware https://shopware.github.io/helm-charts
          helm repo add opentelemetry https://open-telemetry.github.io/opentelemetry-helm-charts
          helm repo add rustfs https://rustfs.github.io/helm
          helm dependency build charts/shopware

          helm template charts/shopware-operator --set crds.installOnly=true | kubectl apply --server-side -f -
          helm template op charts/shopware-operator --namespace test --set crds.installOnly=false --set crds.install=false | kubectl apply -f -
          helm template template charts/shopware-operator --namespace test-template --set crds.installOnly=false --set crds.install=false | kubectl apply -f -

          tar -xOf charts/shopware/charts/pxc-operator-*.tgz pxc-operator/crds/crd.yaml | kubectl apply --server-side -f -
          for crd in \
            perconaxtradbclusters.pxc.percona.com \
            perconaxtradbclusterbackups.pxc.percona.com \
            perconaxtradbclusterrestores.pxc.percona.com; do
            established=""
            for i in $(seq 1 30); do
              established=$(kubectl get crd "$crd" -o jsonpath='{range .status.conditions[?(@.type=="Established")]}{.status}{end}' 2>/dev/null || true)
              if [ "$established" = "True" ]; then
                break
              fi
              sleep 2
            done
            if [ "$established" != "True" ]; then
              kubectl get crd "$crd" -o yaml
              exit 1
            fi
          done

          kubectl wait --namespace test --for=condition=Available --timeout=60s deployment/op-shopware-operator || {
            kubectl get deployment/op-shopware-operator --namespace test -o json && exit 2
          }
          kubectl wait --namespace test-template --for=condition=Available --timeout=60s deployment/template-shopware-operator || {
            kubectl get deployment/template-shopware-operator --namespace test-template -o json && exit 3
          }

      - name: Run helm install
        run: |
          helm install test --namespace test charts/shopware \
            --set rustfs.storageclass.dataStorageSize=100Mi \
            --set rustfs.storageclass.logStorageSize=100Mi \
            --set valkeyapp.master.resources.requests.cpu=200m \
            --set valkeysession.master.resources.requests.cpu=200m \
            --set valkeyworker.master.resources.requests.cpu=200m

          kubectl wait --namespace test store/test --for='jsonpath={.status.state}'=setup --timeout=1m

          sleep 10

          kubectl wait --namespace test jobs/test-setup --timeout=8m --for=condition=complete || {
            kubectl get job/test-setup --namespace test -o json; \
            kubectl get job --namespace test -o wide; \
            kubectl get pods --namespace test -o wide; \
            LATEST_POD=$(kubectl get pods --sort-by=.metadata.creationTimestamp -n test -o jsonpath='{.items[-1].metadata.name}')
            kubectl logs $LATEST_POD -n test && exit 4
          }

          kubectl wait --namespace test store/test --for='jsonpath={.status.state}'=ready --timeout=1m || {
            kubectl get store/test --namespace test -o json && exit 5
          }

          kubectl get pods --namespace test -o wide
          helm uninstall test --namespace test
          kubectl wait --namespace test --for=delete store/test --timeout=2m
          kubectl wait --namespace test --for=delete ingress/test-rustfs-s3-api --timeout=2m || true
          kubectl wait --namespace test --for=delete ingress/test-rustfs --timeout=2m || true

      - name: Run helm template
        run: |
          helm template template charts/shopware --namespace test-template \
            --set rustfs.storageclass.dataStorageSize=100Mi \
            --set rustfs.storageclass.logStorageSize=100Mi \
            --set valkeyapp.master.resources.requests.cpu=200m \
            --set valkeysession.master.resources.requests.cpu=200m \
            --set valkeyworker.master.resources.requests.cpu=200m | kubectl apply -n test-template -f -

          kubectl wait --namespace test-template store/template --for='jsonpath={.status.state}'=setup --timeout=1m

          sleep 10

          kubectl wait --namespace test-template jobs/template-setup --timeout=8m --for=condition=complete || {
            kubectl get job/template-setup --namespace test-template -o json; \
            kubectl get job --namespace test-template -o wide; \
            kubectl get pods --namespace test-template -o wide; \
            LATEST_POD=$(kubectl get pods --sort-by=.metadata.creationTimestamp -n test-template -o jsonpath='{.items[-1].metadata.name}')
            kubectl logs $LATEST_POD -n test-template && exit 6
          }

          kubectl wait --namespace test-template store/template --for='jsonpath={.status.state}'=ready --timeout=1m || {
            kubectl get store/template --namespace test-template -o json && exit 7
          }

          kubectl get pods --namespace test-template -o wide
