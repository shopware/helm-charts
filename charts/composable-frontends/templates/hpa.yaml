{{- if .Values.horizontalPodAutoscaler.enabled }}
{{- $minReplicas := required "horizontalPodAutoscaler.enabled is true but horizontalPodAutoscaler.minReplicas is not set" .Values.horizontalPodAutoscaler.minReplicas }}
{{- $maxReplicas := required "horizontalPodAutoscaler.enabled is true but horizontalPodAutoscaler.maxReplicas is not set" .Values.horizontalPodAutoscaler.maxReplicas }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "composable-frontends.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "composable-frontends.labels" . | nindent 4 }}
    {{- with .Values.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "composable-frontends.fullname" . }}
  minReplicas: {{ $minReplicas }}
  maxReplicas: {{ $maxReplicas }}
  {{- with .Values.horizontalPodAutoscaler.metrics }}
  metrics:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with .Values.horizontalPodAutoscaler.behavior }}
  behavior:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
