{{- if .Values.pdb.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "composable-frontends.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "composable-frontends.labels" . | nindent 4 }}
    {{- with .Values.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  {{- if hasKey .Values.pdb "minAvailable" }}
  minAvailable: {{ .Values.pdb.minAvailable }}
  {{- else if hasKey .Values.pdb "maxUnavailable" }}
  maxUnavailable: {{ .Values.pdb.maxUnavailable }}
  {{- else }}
  {{- fail "pdb.enabled is true but neither pdb.minAvailable nor pdb.maxUnavailable is set" }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "composable-frontends.selectorLabels" . | nindent 6 }}
{{- end }}
